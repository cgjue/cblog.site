{% extends 'base.html' %}
{% block title %}{{ post['title'] }}{% endblock %}
{% block content %}
  <style>
    .comment_submit{

    }
  </style>
  <article class="post">
      <header>
        <div>
          <h1>
          <a href="{{ url_for('blog.view', id=post['id']) }}">{{ post['title'] }}</a>
          </h1>
          <div class="about">by {{ post['username'] }} on {{ post['created'].strftime('%Y-%m-%d') }}</div>
        </div>
        {% if g.user['id'] == post['author_id'] %}
          <a class="action" href="{{ url_for('blog.update', id=post['id']) }}">Edit</a>
        {% endif %}
      </header>
      <div class="body">{{ post['body']|safe }}</div>
      <div class="comment">
        <label>评论</label>
        <div id="comment_edit"></div>
        <input type="submit" value="畅所欲言" onclick="post_comment()" class="comment_submit" disabled=true/>
